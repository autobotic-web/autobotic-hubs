<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collect Your XP!</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:transparent}
  body{
    font-family:"Segoe UI",system-ui,Arial,sans-serif;color:#fff;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;
  }
  h1{font-size:clamp(24px,5vw,40px);font-weight:800;text-align:center;
    background:linear-gradient(180deg,#fff,#ffd64a);-webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 2px 18px rgba(0,0,0,.35)}
  .stage{perspective:900px}
  .coin{width:170px;height:170px;position:relative;transform-style:preserve-3d;
    animation:bob 3.8s ease-in-out infinite;transition:filter .25s}
  .coin-link:hover .coin{filter:drop-shadow(0 14px 30px rgba(255,200,60,.6));animation:flip 1.1s ease-in-out infinite}
  .coin-link{text-decoration:none}
  .face{position:absolute;inset:0;border-radius:50%;display:flex;align-items:center;justify-content:center;
    backface-visibility:hidden;border:8px solid #b9810f;
    background:radial-gradient(circle at 32% 28%, #fff6c2 0%, #ffd64a 32%, #e8a417 70%, #9c6a06 100%);
    box-shadow:inset 0 0 18px rgba(120,70,0,.55), inset 0 0 0 4px rgba(255,255,255,.25)}
  .face.back{transform:rotateY(180deg)}
  .sym{font-size:60px;font-weight:900;letter-spacing:2px;color:#7a5202;text-shadow:0 1px 0 #fff3b0,0 -1px 0 #6b4600}
  .face::after{content:"";position:absolute;inset:0;border-radius:50%;mix-blend-mode:screen;
    background:linear-gradient(115deg,transparent 35%,rgba(255,255,255,.85) 48%,transparent 60%);
    transform:translateX(-120%);animation:shine 3.4s ease-in-out infinite}
  .edge{position:absolute;top:0;left:50%;width:16px;height:170px;transform:translateX(-50%) rotateY(90deg);
    background:linear-gradient(90deg,#8a5e07,#ffd64a,#8a5e07);border-radius:5px}
  .btn{color:#ffe27a;font-weight:700;font-size:18px;text-decoration:none;text-align:center}
  .coin-link:hover .btn{text-decoration:underline}
  @keyframes bob{
    0%   {transform:translateY(0)    rotateX(8deg) rotateZ(-3deg)}
    50%  {transform:translateY(-18px) rotateX(-6deg) rotateZ(3deg)}
    100% {transform:translateY(0)    rotateX(8deg) rotateZ(-3deg)}
  }
  @keyframes flip{from{transform:rotateY(0)}to{transform:rotateY(360deg)}}
  @keyframes shine{0%,100%{transform:translateX(-120%)}45%,55%{transform:translateX(120%)}}
</style>
</head>
<body>
  <!-- ============================================================
       GITHUB-HOSTED VERSION — one file serves EVERY lesson.
       You do NOT edit this file per lesson. Instead, in each lesson
       page's Wix embed (Website address mode), append the lesson to
       the URL, e.g.:
         .../lesson-coin-button.html?lesson=intermediate-lesson-1a
       The slug after ?lesson= is that lesson page's URL ending.
       (Advanced: ?url=https://full/address also works.)
       ============================================================ -->
  <script>
    var BASE = "https://www.autoboticedu.com/";
    var DASH_URL = BASE + "intermediate-dashboard";   // same for every lesson
    var LESSON_URL = "";
    try {
      var p = new URLSearchParams(location.search);
      var full = p.get('url');                 // optional full-URL override
      var slug = p.get('lesson');              // e.g. "intermediate-lesson-1a"
      if (full && full.indexOf('http') === 0) { LESSON_URL = full; }
      else if (slug) { LESSON_URL = BASE + slug.replace(/^\/+/, ''); }
    } catch (e) {}
  </script>

  <h1>⚡ Collect Your XP! ⚡</h1>
  <a class="coin-link" id="coinLink" href="#" target="_blank" rel="noopener">
    <div class="stage">
      <div class="coin">
        <div class="face front"><span class="sym">XP</span></div>
        <div class="edge"></div>
        <div class="face back"><span class="sym">XP</span></div>
      </div>
    </div>
  </a>
  <a class="coin-link btn" id="coinCaption" href="#" target="_blank" rel="noopener">Grab the coin &amp; earn XP points! →</a>
  <a id="progressLink" href="#" style="display:inline-block;margin-top:14px;padding:10px 22px;border-radius:999px;background:linear-gradient(135deg,#6c7bff,#22d3ee);color:#fff;font-weight:800;text-decoration:none">📊 Check My Progress</a>

  <script>
    (function(){
      function go(e){
        if(e) e.preventDefault();
        if(!LESSON_URL || LESSON_URL.indexOf('http') !== 0){
          alert('This coin has no lesson link yet. In the Wix embed, add ?lesson=intermediate-lesson-XX to the end of the address.');
          return;
        }
        try { window.top.location.href = LESSON_URL; }   // same tab (whole window)
        catch(e){ var w = window.open(LESSON_URL, '_blank'); if(!w){ window.location.href = LESSON_URL; } }
      }
      var a = document.getElementById('coinLink');
      var b = document.getElementById('coinCaption');
      a.setAttribute('href', LESSON_URL || '#'); b.setAttribute('href', LESSON_URL || '#');
      a.addEventListener('click', go);
      b.addEventListener('click', go);
      var pr = document.getElementById('progressLink');
      if(pr){ pr.setAttribute('href', DASH_URL); pr.setAttribute('target','_blank');
        pr.addEventListener('click', function(e){ e.preventDefault();
          var w = window.open(DASH_URL, '_blank');   // open progress in a NEW tab
          if(!w){ try { window.top.location.href = DASH_URL; } catch(_){ window.location.href = DASH_URL; } } }); }
    })();
  </script>
</body>
</html>
