<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Badges</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",system-ui,Arial,sans-serif;color:#eef0ff;min-height:100vh;padding:8px;
    background:radial-gradient(1200px 700px at 50% -10%, #2a1d5e 0%, #1a1238 45%, #0b1026 100%)}
  header{text-align:center;padding:18px 12px 4px}
  header h2{font-size:clamp(28px,5vw,52px);font-weight:800;letter-spacing:.5px;
    background:linear-gradient(180deg,#fff,#ffd64a);-webkit-background-clip:text;background-clip:text;color:transparent}
  header p{margin-top:8px;color:#cfd2f0;font-size:clamp(13px,2vw,17px)}
  .count{margin-top:8px;color:#ffe27a;font-weight:800}
  .sect{max-width:980px;margin:18px auto 0;padding:0 16px}
  .sect h3{font-size:15px;letter-spacing:.4px;text-transform:uppercase;color:#aab0e6;font-weight:800;margin:18px 0 10px;border-bottom:1px solid #33386f;padding-bottom:6px}
  .grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .badge{position:relative;background:#1b1f44;border:1px solid #33386f;border-radius:18px;padding:18px 12px;text-align:center;
    color:#fff;transition:transform .15s ease, box-shadow .2s ease}
  .badge .bi{font-size:44px;line-height:1;filter:drop-shadow(0 4px 10px rgba(0,0,0,.45))}
  .badge b{display:block;margin-top:10px;font-size:14px}
  .badge .sub{display:block;margin-top:4px;font-size:11px;line-height:1.3;opacity:.82}
  .badge .tier-tag{display:none;margin-top:8px;font-size:10.5px;font-weight:900;letter-spacing:.5px;text-transform:uppercase;
    border-radius:999px;padding:2px 10px;background:rgba(0,0,0,.22)}
  .badge.earned .tier-tag{display:inline-block}
  .badge.earned:hover{transform:translateY(-3px)}
  .badge.locked{opacity:.42;filter:grayscale(1)}
  .pill{position:absolute;top:-10px;right:-10px;min-width:30px;height:30px;padding:0 8px;border-radius:999px;
    background:linear-gradient(135deg,#34d399,#22d3ee);color:#06351f;font-weight:900;font-size:14px;
    display:none;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.45);border:3px solid #d1fae5}
  .badge.earned .pill{display:flex}
</style>
</head>
<body>
  <header>
    <h2>🏅 My Badges</h2>
    <p>Collect badges as you learn! Earn a skill badge in more lessons to <b>level it up</b>: Bronze at 3, Silver at 6, Gold at 9 … up to Diamond at 21.</p>
    <div class="count" id="count"></div>
  </header>
  <main id="sections"></main>

<script>
  /* Skill badges accumulate a COUNT (how many lessons you earned each in) and
     change tier colour at every multiple of 5. Goal badges are earned once. */
  const CATALOG = [
    {sect:'Skill badges', items:[
      {id:'finisher',  type:'skill', icon:'🎓', label:'Mission Finisher', sub:'Finish a lesson'},
      {id:'quizmaster',type:'skill', icon:'🧠', label:'Quiz Master',      sub:'All quizzes right first try'},
      {id:'puzzler',   type:'skill', icon:'🧩', label:'Puzzle Solver',    sub:'Solve a lesson puzzle'},
      {id:'speed',     type:'skill', icon:'⚡', label:'Speed Runner',     sub:'Beat the time goal'},
      {id:'firstrun',  type:'skill', icon:'💻', label:'First Run',        sub:'Run code in a lesson'}
    ]},
    {sect:'Special', items:[
      {id:'builder', type:'skill', icon:'🛠️', label:'Pi Builder',       sub:'Set up your Raspberry Pi'},
      {id:'thinker', type:'skill', icon:'💡', label:'Critical Thinker', sub:'Master AI ethics & prompting'},
      {id:'bestvideo', type:'skill', icon:'🏆', label:'Best Video', sub:'Won Best Video of the Month'}
    ]},
    {sect:'Journey', items:[
      {id:'m_first', type:'goal', icon:'👣', label:'First Steps',      sub:'Finish your 1st lesson'},
      {id:'m_5',     type:'goal', icon:'🖐️', label:'High Five',        sub:'Finish 5 lessons'},
      {id:'m_10',    type:'goal', icon:'🔟', label:'Perfect Ten',      sub:'Finish 10 lessons'},
      {id:'m_15',    type:'goal', icon:'📚', label:'Fifteen Strong',   sub:'Finish 15 lessons'},
      {id:'m_22',    type:'goal', icon:'👑', label:'Course Champion',  sub:'Finish all 22 lessons'}
    ]},
    {sect:'Level', items:[
      {id:'lvl2', type:'goal', icon:'🎖️', label:'Level 2 Engineer', sub:'Reach Level 2 (12 lessons)'}
    ]},
    {sect:'XP tiers', items:[
      {id:'xp1', type:'goal', icon:'🌱', label:'XP Rookie',  sub:'Earn 10 XP'},
      {id:'xp2', type:'goal', icon:'🔥', label:'XP Pro',     sub:'Earn 100 XP'},
      {id:'xp3', type:'goal', icon:'💎', label:'XP Legend',  sub:'Earn 500 XP'}
    ]},
    {sect:'Topic specialists', items:[
      {id:'t_linux',  type:'goal', icon:'🐧', label:'Linux Explorer',    sub:'Finish Pi Setup & Linux CLI'},
      {id:'t_python', type:'goal', icon:'🐍', label:'Python Coder',      sub:'Finish Python Basics & Blink LED'},
      {id:'t_gpio',   type:'goal', icon:'🔌', label:'GPIO Tinkerer',     sub:'Finish LED, Buzzer & Button Matrix'},
      {id:'t_sensor', type:'goal', icon:'📡', label:'Sensor Specialist', sub:'Finish all the sensor lessons'},
      {id:'t_display',type:'goal', icon:'📟', label:'Display Master',     sub:'Finish all the display lessons'},
      {id:'t_motor',  type:'goal', icon:'⚙️', label:'Motor Mover',       sub:'Finish Servo & DC Motor'},
      {id:'t_vision', type:'goal', icon:'👁️', label:'Vision Expert',     sub:'Finish all the camera lessons'}
    ]},
    {sect:'Mastery', items:[
      {id:'quizsupreme',type:'goal', icon:'🎯', label:'Quiz Master Supreme', sub:'Quiz Master in 5 lessons'},
      {id:'speeddemon', type:'goal', icon:'🏎️', label:'Speed Demon',         sub:'Speed Runner in 5 lessons'},
      {id:'puzzlepro',  type:'goal', icon:'🧠', label:'Puzzle Pro',          sub:'Puzzle Solver in 5 lessons'},
      {id:'collector',  type:'goal', icon:'🏆', label:'Badge Collector',     sub:'Earn 10+ different badges'}
    ]}
  ];

  // Intermediate has 22 lessons, so medals step every 3 (Bronze@3 ... Diamond@21) to keep Diamond reachable.
  const BASE = {bg:'', fg:'', name:'Earned'};   // Earned = keep the card's default background; medals add colour from Bronze up
  const TIERS = [
    {bg:'linear-gradient(135deg,#7c4a1e,#b9772f)', fg:'#ffe9c7', name:'Bronze'},
    {bg:'linear-gradient(135deg,#9aa3ad,#d6dde6)', fg:'#1f2733', name:'Silver'},
    {bg:'linear-gradient(135deg,#c8951a,#ffd54a)', fg:'#3a2a02', name:'Gold'},
    {bg:'linear-gradient(135deg,#0b7a5b,#19c98e)', fg:'#04241a', name:'Emerald'},
    {bg:'linear-gradient(135deg,#1e40af,#4f86f7)', fg:'#eaf2ff', name:'Sapphire'},
    {bg:'linear-gradient(135deg,#9b1c2e,#f0506e)', fg:'#fff0f2', name:'Ruby'},
    {bg:'linear-gradient(135deg,#5eead4,#a5b4fc,#f0abfc)', fg:'#062032', name:'Diamond'}
  ];
  function tierFor(n){ var i=Math.floor(n/3); return i<=0 ? BASE : TIERS[Math.min(TIERS.length-1, i-1)]; }
  const GOAL_BG='linear-gradient(135deg,#16a34a,#06b6d4)', GOAL_FG='#04261f';

  const root=document.getElementById('sections'); const byId={}; let total=0;
  CATALOG.forEach(group=>{
    const sec=document.createElement('section'); sec.className='sect';
    sec.innerHTML='<h3>'+group.sect+'</h3>';
    const grid=document.createElement('div'); grid.className='grid'; sec.appendChild(grid);
    group.items.forEach(b=>{
      total++;
      const d=document.createElement('div'); d.className='badge locked'; d.dataset.type=b.type;
      d.innerHTML='<div class="pill" data-pill>0</div><div class="bi">'+b.icon+'</div><b>'+b.label+'</b>'+
        '<span class="sub">'+b.sub+'</span><span class="tier-tag" data-tag></span>';
      grid.appendChild(d); byId[b.id]={el:d, type:b.type};
    });
    root.appendChild(sec);
  });

  function applyEarned(counts){
    counts = counts || {}; let earned=0;
    Object.keys(byId).forEach(id=>{
      const ref=byId[id]; const el=ref.el, type=ref.type; const n=Number(counts[id]||0);
      const pill=el.querySelector('[data-pill]'); const tag=el.querySelector('[data-tag]');
      if(n>0){
        el.classList.add('earned'); el.classList.remove('locked'); earned++;
        if(type==='skill'){
          const t=tierFor(n);
          if(t.bg){ el.style.background=t.bg; el.style.color=t.fg; el.style.borderColor='rgba(255,255,255,.35)'; tag.style.color=t.fg; }
          else { el.style.background=''; el.style.color=''; el.style.borderColor=''; tag.style.color=''; }
          pill.textContent=n; tag.textContent=t.name;
        } else {
          el.style.background=''; el.style.color=''; el.style.borderColor=''; tag.style.color='';  // earned goal badge = keep default background (no colour change)
          pill.textContent=n; tag.textContent='Earned';   // show the count number on goal badges too (1 when earned)
        }
      } else {
        el.classList.add('locked'); el.classList.remove('earned');
        el.style.background=''; el.style.color=''; el.style.borderColor='';
      }
    });
    const c=document.getElementById('count');
    if(c) c.textContent=earned+' / '+total+' badges earned';
  }
  applyEarned({});

  window.addEventListener('message',(e)=>{
    const d=e.data;
    if(d && d.source==='badges-progress' && d.badgeCounts){ applyEarned(d.badgeCounts); }
  });
</script>
</body>
</html>
