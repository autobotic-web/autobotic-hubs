<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top 10 Leaderboard</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",system-ui,Arial,sans-serif;color:#eef0ff;min-height:100vh;padding:8px;
    background:radial-gradient(1200px 700px at 50% -10%, #2a1d5e 0%, #1a1238 45%, #0b1026 100%)}
  header{text-align:center;padding:10px 12px 4px}
  header h2{font-size:clamp(28px,5vw,52px);font-weight:800;letter-spacing:.5px;
    background:linear-gradient(180deg,#fff,#ffd64a);-webkit-background-clip:text;background-clip:text;color:transparent}
  header p{margin-top:8px;color:#cfd2f0;font-size:clamp(14px,2vw,18px)}
  .board{max-width:620px;margin:20px auto;display:flex;flex-direction:column;gap:10px}
  .row{display:flex;align-items:center;gap:14px;background:#1e2147;border:1px solid #33386f;border-radius:14px;
    padding:12px 16px;transition:transform .15s ease}
  .row:hover{transform:translateY(-2px)}
  .rank{flex:none;width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;
    font-weight:900;font-size:18px;background:#262a59;color:#cfd3f5}
  .name{flex:1;font-size:14px;font-weight:600;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .xp{flex:none;font-size:14px;font-weight:800;color:#ffe27a}
  /* top 3 flair */
  .row.r1{border-color:#ffd64a;box-shadow:0 6px 18px rgba(255,200,60,.22)}
  .row.r1 .rank{background:linear-gradient(135deg,#fff6c2,#e8a417);color:#5a3e00}
  .row.r2 .rank{background:linear-gradient(135deg,#e9eefb,#aab4cf);color:#2b3344}
  .row.r3 .rank{background:linear-gradient(135deg,#f6c79a,#c08457);color:#3a2310}
  .empty{text-align:center;color:#9aa0d0;padding:24px}
</style>
</head>
<body>
  <header>
    <h2>🏆 Top 10 Leaderboard</h2>
    <p>Highest total XP across the course</p>
  </header>
  <main class="board" id="board"><div class="empty">Loading…</div></main>

<script>
  const MEDAL = {1:'🥇',2:'🥈',3:'🥉'};
  function render(list){
    const board = document.getElementById('board');
    board.innerHTML = '';
    if(!list || !list.length){ board.innerHTML = '<div class="empty">No scores yet — be the first!</div>'; return; }
    list.forEach(m=>{
      const row = document.createElement('div');
      row.className = 'row' + (m.rank<=3 ? ' r'+m.rank : '');
      const rankTxt = MEDAL[m.rank] || ('#'+m.rank);
      row.innerHTML = `<div class="rank">${rankTxt}</div>
        <div class="name">${(m.name||'Student').replace(/</g,'&lt;')}</div>
        <div class="xp">${(m.xp||0)} XP</div>`;
      board.appendChild(row);
    });
  }

  // Receive the top-10 list from the Wix page (page-dashboard.js)
  window.addEventListener('message',(e)=>{
    const d = e.data;
    if(d && d.source === 'leaderboard' && Array.isArray(d.top)){ render(d.top); }
  });
</script>
</body>
</html>
