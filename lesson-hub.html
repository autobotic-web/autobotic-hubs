<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson Hub — Spin to Learn</title>
<style>
  :root{
    --bg1:#0b1026; --bg2:#1a1238; --ink:#fff;
    --gold1:#fff6c2; --gold2:#ffd64a; --gold3:#e8a417; --gold4:#9c6a06;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Segoe UI",system-ui,Arial,sans-serif;color:var(--ink);min-height:100vh;
    background:radial-gradient(1200px 700px at 50% -10%, #2a1d5e 0%, var(--bg2) 45%, var(--bg1) 100%);
    overflow-x:hidden;
  }
  header{text-align:center;padding:42px 16px 6px}
  header h1{font-size:clamp(28px,5vw,52px);font-weight:800;letter-spacing:.5px;
    background:linear-gradient(180deg,#fff,#ffd64a);-webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 2px 18px rgba(255,200,60,.25)}
  header p{margin-top:10px;color:#cfd2f0;font-size:clamp(14px,2vw,18px)}
  .count{margin-top:8px;color:#ffe27a;font-weight:700}

  .grid{max-width:1180px;margin:26px auto 70px;padding:0 22px;display:grid;gap:46px 30px;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));justify-items:center}

  .coin-link{text-decoration:none;color:inherit;display:flex;flex-direction:column;align-items:center;gap:14px}
  .stage{perspective:900px;position:relative}
  .coin{width:128px;height:128px;position:relative;transform-style:preserve-3d;transition:filter .25s ease}
  /* LOCKED (not completed): greyscale, still */
  .coin{filter:grayscale(1) brightness(.7)}
  /* DONE (completed): full colour + soft static glow */
  .coin-link.done .coin{filter:drop-shadow(0 6px 16px rgba(255,200,60,.45))}
  /* spin only while hovering a coin */
  .coin-link.done:hover .coin{animation:spin 1.2s linear infinite;filter:drop-shadow(0 10px 22px rgba(255,200,60,.5))}

  .face{position:absolute;inset:0;border-radius:50%;display:flex;align-items:center;justify-content:center;
    backface-visibility:hidden;
    background:radial-gradient(circle at 32% 28%, var(--gold1) 0%, var(--gold2) 32%, var(--gold3) 70%, var(--gold4) 100%);
    border:6px solid #b9810f;box-shadow:inset 0 0 14px rgba(120,70,0,.55), inset 0 0 0 3px rgba(255,255,255,.25)}
  .face.back{transform:rotateY(180deg)}
  .face .sym{font-size:54px;font-weight:900;color:#7a5202;text-shadow:0 1px 0 #fff3b0, 0 -1px 0 #6b4600}
  .face .num{position:absolute;bottom:14px;font-size:15px;font-weight:800;color:#7a5202;letter-spacing:.5px}
  /* static soft sheen (no animation) */
  .face::after{content:"";position:absolute;inset:0;border-radius:50%;
    background:linear-gradient(115deg,transparent 42%,rgba(255,255,255,.30) 50%,transparent 60%);mix-blend-mode:screen}
  .edge{position:absolute;top:0;left:50%;width:12px;height:128px;transform:translateX(-50%) rotateY(90deg);
    background:linear-gradient(90deg,#8a5e07,#ffd64a,#8a5e07);border-radius:4px}

  /* ✓ badge shown only when done */
  .check{position:absolute;top:-6px;right:-6px;width:40px;height:40px;border-radius:50%;
    background:#34d399;color:#06351f;font-size:22px;font-weight:900;display:none;
    align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.4);border:3px solid #d1fae5}
  .coin-link.done .check{display:flex}

  .label{text-align:center;font-size:14px;font-weight:600;color:#e9ecff;max-width:170px;line-height:1.25;min-height:34px}
  .status{font-size:12px;font-weight:700;margin-top:2px;color:#9aa0d0}
  .coin-link.done .status{color:#34d399}
  .coin-link:hover .label{color:#ffe27a}

  @keyframes spin{from{transform:rotateY(0)}to{transform:rotateY(360deg)}}
  /* one-time unlock flip when a coin turns gold */
  .coin-link.pop .coin{animation:popgold 1.1s ease}
  @keyframes popgold{0%{transform:rotateY(0) scale(.9)}60%{transform:rotateY(540deg) scale(1.18)}100%{transform:rotateY(720deg) scale(1)}}
  .hub-toast-wrap{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
  .hub-toast{background:linear-gradient(135deg,#34d399,#22d3ee);color:#06351f;font-weight:800;padding:10px 18px;border-radius:999px;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:htoast 2.6s ease forwards}
  @keyframes htoast{0%{opacity:0;transform:translateY(-10px) scale(.9)}10%{opacity:1;transform:none}80%{opacity:1}100%{opacity:0;transform:translateY(-10px)}}
  @keyframes shine{0%,100%{transform:translateX(-120%)}45%,55%{transform:translateX(120%)}}
  footer{text-align:center;color:#9aa0d0;font-size:13px;padding:0 16px 40px}
  .spark{position:fixed;width:4px;height:4px;border-radius:50%;background:#ffe27a;box-shadow:0 0 8px #ffd64a;opacity:.6;animation:float 7s linear infinite;pointer-events:none}
  /* hover sparkle trail emitted from a coin */
  .trail-spark{position:absolute;left:50%;top:50%;width:9px;height:9px;border-radius:50%;
    background:radial-gradient(circle,#fff 0%,#ffe27a 45%,rgba(255,214,74,0) 70%);
    box-shadow:0 0 10px #ffd64a;pointer-events:none;transform:translate(-50%,-50%);will-change:transform,opacity}
  @keyframes float{from{transform:translateY(105vh)}to{transform:translateY(-10vh)}}
</style>
</head>
<body>
  <header>
    <h1>✨ Spin to Learn ✨</h1>
    <p>Finish a lesson to turn its coin gold. Click a coin to open the lesson.</p>
    <div class="count" id="count"></div>
  </header>

  <main class="grid" id="grid"></main>
  <footer>Coins turn gold as you complete lessons.</footer>

<script>
  /* ============================================================
     EDIT URLs: set each lesson's Wix PAGE url in `url`.
     `id` must match the lesson's XP_CFG.lessonId (do not change).
     Leave url as "#" until that lesson's page exists.
     ============================================================ */
  const lessons = [
    ["1A","lesson-1a-ai-ethics","AI Ethics & Prompting","#"],
    ["1B","lesson-1b-pi-setup","Raspberry Pi Desktop Setup","#"],
    ["2","lesson-2-linux-cli","Linux Command Line","#"],
    ["3","lesson-3-python-basics","Python Basics","#"],
    ["4","lesson-4-blink-led","Blink an LED with GPIO","#"],
    ["5","lesson-5-buzzer","Make Sounds with a Buzzer","#"],
    ["6","lesson-6-button-matrix","Reading a Button Matrix","#"],
    ["7","lesson-7-ldr","Sensing Light with an LDR","#"],
    ["8","lesson-8-pir-motion","Detecting Motion (PIR)","#"],
    ["9","lesson-9-vibration","Vibration Motor","#"],
    ["10","lesson-10-sound","Detecting Sound","#"],
    ["11","lesson-11-7segment","4-Digit 7-Segment Display","#"],
    ["12","lesson-12-led-matrix","LED Matrix Patterns","#"],
    ["13","lesson-13-lcd1602","Text on an LCD 1602","#"],
    ["14","lesson-14-ws2812b","RGB LED Strip (NeoPixel)","#"],
    ["15","lesson-15-ultrasonic","Measuring Distance (Ultrasonic)","#"],
    ["16","lesson-16-color-sensor","Colour Sensor","#"],
    ["17","lesson-17-servo","Servo Motor","#"],
    ["18","lesson-18-dc-motor","DC Motor Control","#"],
    ["19","lesson-19-opencv-camera","Camera & OpenCV","#"],
    ["20","lesson-20-hsv-tracker","HSV Colour Tracker","#"],
    ["21","lesson-21-object-following","Object Following","#"]
  ];

  const grid = document.getElementById("grid");
  const byId = {};
  lessons.forEach(([num,id,title,url])=>{
    // URL follows the site's naming: autoboticedu.com/intermediate-lesson-<num> (e.g. -1a, -1, -2 ...)
    const lessonUrl = (url && url.indexOf('http')===0) ? url
      : ("https://autoboticedu.com/intermediate-lesson-" + String(num).toLowerCase());
    const a = document.createElement("a");
    a.className = "coin-link";
    a.dataset.lesson = id;
    a.href = lessonUrl;
    a.target = "_blank"; a.rel = "noopener";
    a.addEventListener('click', (e)=>{ e.preventDefault();
      try { window.top.location.href = lessonUrl; }        // same tab (whole window)
      catch(err){ const w = window.open(lessonUrl, '_blank'); if(!w){ window.location.href = lessonUrl; } }
    });
    a.innerHTML = `
      <div class="stage">
        <div class="check">✓</div>
        <div class="coin">
          <div class="face front"><span class="sym">$</span><span class="num">L${num}</span></div>
          <div class="face back"><span class="sym">$</span><span class="num">L${num}</span></div>
        </div>
      </div>
      <div class="label">Lesson ${num}<br>${title}</div>
      <div class="status">Not done yet</div>`;
    grid.appendChild(a);
    byId[id] = a;
  });

  // Magical sparkle trail while hovering a coin
  document.querySelectorAll('.coin-link').forEach(link=>{
    const stage = link.querySelector('.stage');
    let timer = null;
    function emit(){
      const s = document.createElement('div');
      s.className = 'trail-spark';
      stage.appendChild(s);
      const ang = Math.random() * Math.PI * 2;
      const dist = 45 + Math.random() * 70;
      const dx = Math.cos(ang) * dist;
      const dy = Math.sin(ang) * dist - 24;   // drift slightly upward
      const dur = 600 + Math.random() * 500;
      s.animate([
        { transform:'translate(-50%,-50%) scale(.3)', opacity:1 },
        { transform:`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(1.1)`, opacity:0 }
      ], { duration: dur, easing: 'ease-out' });
      setTimeout(()=>s.remove(), dur);
    }
    link.addEventListener('mouseenter', ()=>{ if(link.classList.contains('done') && !timer) timer = setInterval(emit, 80); });
    link.addEventListener('mouseleave', ()=>{ clearInterval(timer); timer = null; });
  });

  // sparkle burst from a coin's stage
  function burstAt(stage, n){
    for(let i=0;i<n;i++){
      const s=document.createElement('div'); s.className='trail-spark'; stage.appendChild(s);
      const ang=Math.random()*6.283, dist=50+Math.random()*95, dx=Math.cos(ang)*dist, dy=Math.sin(ang)*dist, dur=700+Math.random()*500;
      s.animate([{transform:'translate(-50%,-50%) scale(.3)',opacity:1},
        {transform:`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(1.2)`,opacity:0}],{duration:dur,easing:'ease-out'});
      setTimeout(()=>s.remove(),dur);
    }
  }
  function hubToast(msg){
    let w=document.getElementById('hubToast');
    if(!w){ w=document.createElement('div'); w.className='hub-toast-wrap'; w.id='hubToast'; document.body.appendChild(w); }
    const t=document.createElement('div'); t.className='hub-toast'; t.textContent=msg; w.appendChild(t); setTimeout(()=>t.remove(),2600);
  }
  // remember which coins were already gold (so we only celebrate NEW unlocks)
  function loadSeen(){ try{ return new Set(JSON.parse(localStorage.getItem('hubSeen')||'[]')); }catch(e){ return null; } }
  function saveSeen(set){ try{ localStorage.setItem('hubSeen', JSON.stringify([...set])); }catch(e){} }

  function applyCompleted(list){
    list = list || [];
    const seen = loadSeen();              // Set, or null if storage is blocked (inline embed)
    let done = 0; const fresh = [];
    list.forEach(id=>{
      const a = byId[id];
      if(a){ a.classList.add("done"); a.querySelector(".status").textContent = "✓ Completed"; done++;
        if(!seen || !seen.has(id)) fresh.push(id); }
    });
    const c = document.getElementById("count");
    if(c) c.textContent = done + " / " + lessons.length + " lessons completed";
    // celebrate the just-unlocked coins (or all, if storage is unavailable), staggered
    fresh.forEach((id,i)=>{
      const a = byId[id]; if(!a) return; const stage = a.querySelector('.stage');
      setTimeout(()=>{
        a.classList.add('pop'); burstAt(stage, 18); setTimeout(()=>a.classList.remove('pop'), 1200);
        if(seen){ const name=(a.querySelector('.label')?.innerText||'Lesson').split('\n')[0]; hubToast('🎉 '+name+' unlocked!'); }
      }, i*260);
    });
    if(seen){ list.forEach(id=>seen.add(id)); saveSeen(seen); }
  }
  applyCompleted([]); // start: all grey

  // Receive the student's completed-lesson list from the Wix page (page-hub.js)
  window.addEventListener("message",(e)=>{
    const d = e.data;
    if(d && d.source === "hub-progress" && Array.isArray(d.completedLessons)){
      applyCompleted(d.completedLessons);
    }
  });

  // sparkles (subtle, few)
  for(let i=0;i<8;i++){
    const s=document.createElement("div");s.className="spark";
    s.style.left=Math.random()*100+"vw";
    s.style.animationDelay=(Math.random()*7)+"s";
    s.style.animationDuration=(5+Math.random()*5)+"s";
    document.body.appendChild(s);
  }
</script>
</body>
</html>
