<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Skills</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",system-ui,Arial,sans-serif;color:#eef0ff;min-height:100vh;padding:8px;
    background:radial-gradient(1200px 700px at 50% -10%, #2a1d5e 0%, #1a1238 45%, #0b1026 100%)}
  header{text-align:center;padding:14px 12px 4px}
  header h2{font-size:clamp(24px,4.5vw,40px);font-weight:800;
    background:linear-gradient(180deg,#fff,#ffd64a);-webkit-background-clip:text;background-clip:text;color:transparent}
  header p{margin-top:6px;color:#cfd2f0;font-size:13.5px;max-width:560px;margin-left:auto;margin-right:auto}
  .card{max-width:620px;margin:14px auto 24px;background:#1b1f44;border:1px solid #33386f;border-radius:18px;padding:18px 20px}
  .src{text-align:right;color:#aab0e6;font-size:12px;margin-bottom:12px}
  .skill{margin:12px 0}
  .skill .row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;gap:8px;flex-wrap:wrap}
  .skill .name{font-size:14px;font-weight:700}
  .skill .lvl{font-size:13px;font-weight:800}
  .lvl.l0{color:#fda4af}.lvl.l1{color:#fcd34d}.lvl.l2{color:#5eead4}.lvl.l3{color:#86efac}
  .bar{height:10px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden}
  .fill{height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,#7c5cff,#22d3ee);transition:width .8s ease}
  .imp{display:inline-block;background:rgba(52,211,153,.15);border:1px solid rgba(52,211,153,.45);
    color:#a7f3d0;border-radius:999px;padding:1px 10px;font-size:11.5px;font-weight:800;margin-left:6px}
  .locked{text-align:center;padding:26px 16px}
  .locked .ico{font-size:42px}
  .locked b{display:block;font-size:17px;margin:10px 0 4px}
  .locked p{color:#aab0e6;font-size:13.5px}
  .locked .bar{max-width:280px;margin:14px auto 0}
  .locked .fill{background:linear-gradient(90deg,#fbbf24,#34d399)}
  .empty{text-align:center;color:#aab0e6;padding:30px 16px;font-size:14px}
</style>
</head>
<body>
  <header>
    <h2>🛠 My Skills</h2>
    <p>Your engineering skill levels, from your teacher's reviews of your build videos. Post a video each lesson to keep it growing!</p>
  </header>
  <div class="card" id="card"><div class="empty">Loading…</div></div>

<script>
  const SKILLS = [
    {id:'presentation', name:'🎤 Presentation'},
    {id:'hardware',     name:'🔌 Hardware'},
    {id:'coding',       name:'💻 Coding'},
    {id:'problem',      name:'🐛 Problem-solving'},
    {id:'creativity',   name:'✨ Creativity'}
  ];
  const UNLOCK_AT = 3;      // reviews needed to show the profile
  const WINDOW = 5;         // average over the last N reviews (old scores age out)

  function levelWord(avg){
    if(avg < 2)   return {w:'Beginning',  c:'l0'};
    if(avg < 3.5) return {w:'Developing', c:'l1'};
    if(avg < 5)   return {w:'Proficient', c:'l2'};
    return            {w:'Advanced',   c:'l3'};
  }
  const avg=(a)=>a.length? a.reduce((s,x)=>s+x,0)/a.length : 0;

  function render(payload){
    const card=document.getElementById('card');
    // reviews = lessons with a parsable rubric, oldest → newest
    const reviews=(payload.lessons||[])
      .map(l=>{ try{ const r=JSON.parse(l.videoRubric||''); return r&&typeof r==='object'?{r, t:new Date(l.updatedAt||0)}:null; }catch(e){ return null; } })
      .filter(Boolean)
      .sort((a,b)=>a.t-b.t);

    if(reviews.length < UNLOCK_AT){
      const left=UNLOCK_AT-reviews.length;
      card.innerHTML='<div class="locked"><div class="ico">🔒</div><b>Skills profile locked</b>'+
        '<p>Post '+left+' more build video'+(left>1?'s':'')+' and get '+(left>1?'them':'it')+' reviewed to unlock — '+
        reviews.length+' of '+UNLOCK_AT+' reviewed.</p>'+
        '<div class="bar"><div class="fill" style="width:'+Math.round(reviews.length/UNLOCK_AT*100)+'%"></div></div></div>';
      return;
    }

    const recent=reviews.slice(-WINDOW);
    // most improved: newer half vs older half (needs 4+ reviews and a clear gain)
    let best=null;
    if(reviews.length>=4){
      const half=Math.floor(reviews.length/2);
      const older=reviews.slice(0,half), newer=reviews.slice(half);
      SKILLS.forEach(s=>{
        const d=avg(newer.map(x=>Number(x.r[s.id])||0)) - avg(older.map(x=>Number(x.r[s.id])||0));
        if(d>0.5 && (!best || d>best.d)) best={id:s.id, d};
      });
    }

    let html='<div class="src">from '+reviews.length+' build video review'+(reviews.length>1?'s':'')+
      (reviews.length>WINDOW?' · showing your last '+WINDOW:'')+'</div>';
    SKILLS.forEach(s=>{
      const a=avg(recent.map(x=>Number(x.r[s.id])||0));
      const lv=levelWord(a);
      html+='<div class="skill"><div class="row"><span class="name">'+s.name+
        (best&&best.id===s.id?'<span class="imp">📈 most improved</span>':'')+
        '</span><span class="lvl '+lv.c+'">'+lv.w+'</span></div>'+
        '<div class="bar"><div class="fill" style="width:'+Math.round(a/6*100)+'%"></div></div></div>';
    });
    card.innerHTML=html;
  }

  window.addEventListener('message',(e)=>{ const d=e.data;
    if(d && d.source==='skills-profile'){
      if(d.error){ document.getElementById('card').innerHTML='<div class="empty">Could not load skills right now.</div>'; return; }
      render(d);
    } });
</script>
</body>
</html>
